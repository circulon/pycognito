name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  tox:
    runs-on: ubuntu-latest
    name: Tox
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install tox
        run: python -m pip install --upgrade tox

      - name: Run Tox
        run: tox
